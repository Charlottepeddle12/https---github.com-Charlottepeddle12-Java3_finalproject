<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<f:metadata>
    <f:viewAction action="#{messageService.loadConversations}" />
</f:metadata>
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <h:outputStylesheet name="style.css" />
</h:head>
<h:body>
    <h:panelGroup id="dashboard" rendered="#{userLoginBean.token != null}">
        <div class="container">

            <!-- Welcome banner -->
            <div class="welcome-section">
                <div>
                    <h2>👋 Welcome, #{userLoginBean.userName}!</h2>
                    <p class="welcome-sub">Here's what's happening today.</p>
                </div>
                <div class="welcome-avatar">🏠</div>
            </div>

            <!-- Navigation -->
            <h:form styleClass="navbar">
                <h:commandButton value="👥 Friends" action="friends.xhtml?faces-redirect=true" styleClass="btn-primary" />
                <h:commandButton value="🖥️ Servers" action="server.xhtml?faces-redirect=true" styleClass="btn-secondary" />
                <h:commandButton value="🚫 Blocked" action="block.xhtml?faces-redirect=true" styleClass="btn-secondary" />
                <span class="navbar-spacer"></span>
                <h:commandButton value="⬠ Logout" action="#{userLoginBean.logout}" styleClass="btn-danger" />
            </h:form>

            <!-- Start DM -->
            <h:form>
                <h:messages styleClass="alert alert-error" />
                <div class="card">
                    <h3>💬 Start a Direct Message</h3>
                    <div class="form-inline">
                        <h:inputText value="#{messageService.targetUsername}" placeholder="Search for a user..." />
                        <h:commandButton value="Open DM" action="#{messageService.createConversation}" styleClass="btn-primary" />
                    </div>
                    <h:outputText rendered="#{not empty messageService.createConversationStatus}"
                                 value="#{messageService.createConversationStatus}"
                                 styleClass="alert alert-success" />
                </div>
            </h:form>

            <!-- Conversations -->
            <h2>💌 Your Conversations</h2>

            <h:panelGroup rendered="#{empty messageService.conversations}">
                <div class="empty-state">
                    <span class="empty-icon">🗨️</span>
                    <p>No conversations yet. Start a DM with a friend above!</p>
                </div>
            </h:panelGroup>

            <h:panelGroup rendered="#{not empty messageService.conversations}">
                <ui:repeat value="#{messageService.conversations}" var="c">
                    <div class="list-item">
                        <div class="list-item-content">
                            <strong>#{c.username}</strong><br/>
                            <small>Direct Message</small>
                        </div>
                        <div class="list-item-actions">
                            <h:form style="margin:0;">
                                <h:commandButton value="Open →" action="dm.xhtml?faces-redirect=true" styleClass="btn-primary">
                                    <f:setPropertyActionListener
                                        target="#{messageService.conversationID}"
                                        value="#{c.conversationID}" />
                                </h:commandButton>
                            </h:form>
                        </div>
                    </div>
                </ui:repeat>
            </h:panelGroup>

        </div>
    </h:panelGroup>

    <h:panelGroup rendered="#{userLoginBean.userId == 0}">
        <div class="container container-sm">
            <div class="alert alert-info">
                🔒 <strong>Not logged in</strong> — Please sign in to access the dashboard.
            </div>
            <h:button value="Go to Login" outcome="login.xhtml" styleClass="btn-primary" />
        </div>
    </h:panelGroup>
</h:body>
</html>
