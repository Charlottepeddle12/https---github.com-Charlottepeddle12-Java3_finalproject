<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<f:metadata>
    <f:event type="preRenderView" listener="#{friendsBean.loadReceivedFriendRequests}" />
    <f:event type="preRenderView" listener="#{friendsBean.loadFriendNames}" />
    <f:event type="preRenderView" listener="#{blockUserBean.loadBlockedUsers}" />
    <f:viewParam name="channelID" value="#{messageService.channelID}" />
    <f:viewAction action="#{messageService.loadChannel(messageService.channelID)}" rendered="#{not empty messageService.channelID}" />
</f:metadata>
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Channel Chat</title>
    <h:outputStylesheet name="style.css" />
</h:head>
<h:body>
    <h:panelGroup rendered="#{userLoginBean.token != null}">
        <div class="container">

            <!-- Navigation -->
            <div class="navbar">
                <h:button value="← Dashboard" outcome="dashboard.xhtml" styleClass="btn-back" />
                <h:button value="← Channels"  outcome="channels.xhtml"  styleClass="btn-back" />
            </div>

            <h1>📡 Channel Chat</h1>

            <div class="info-box">
                🖥️ <strong>Server:</strong> #{dashboardBean.selectedServerName}
            </div>

            <h:messages styleClass="alert alert-error" />

            <!-- Messages + auto-refresh -->
            <h:form id="chatForm">
                <h:commandButton id="autoRefreshBtn"
                                 action="#{messageService.loadChannel(messageService.channelID)}"
                                 style="display:none;">
                    <f:ajax execute="@this" render="messagesTable"/>
                </h:commandButton>

                <div class="messages-wrapper">
                    <h:panelGroup rendered="#{empty messageService.messages}">
                        <div class="empty-state">
                            <span class="empty-icon">💬</span>
                            <p>No messages yet. Be the first to say something!</p>
                        </div>
                    </h:panelGroup>

                    <ui:repeat value="#{messageService.messages}" var="m">
                        <div class="message">
                            <div class="msg-header">
                                <span class="msg-author">#{m.username}</span>
                                <span class="msg-time">#{messageService.formatDateTime(m.sentOn)}</span>
                            </div>

                            <div class="message-content">
                                <h:panelGroup rendered="#{messageService.editingMessageID != m.messageID}">
                                    <h:outputText value="#{m.messageText}" />
                                    <h:graphicImage rendered="#{not empty m.imageData and empty m.deletedAt}"
                                                   value="data:#{m.imageMimeType};base64,#{messageService.encodeImage(m.imageData)}"
                                                   styleClass="message-image" />
                                </h:panelGroup>
                                <h:panelGroup rendered="#{messageService.editingMessageID == m.messageID}">
                                    <h:inputText value="#{messageService.editText}"
                                                 style="width:100%;" />
                                </h:panelGroup>
                            </div>

                            <div class="message-meta">
                                <h:outputText rendered="#{not empty m.editedAt}" value="✏️ edited" />
                                <h:outputText rendered="#{m.senderID == userLoginBean.userId and not empty messageService.getSeenByUsers(m.messageID)}"
                                             value=" · 👁️ Seen by #{messageService.getSeenByUsersString(m.messageID)}" />
                            </div>

                            <div class="message-actions">
                                <h:panelGroup rendered="#{messageService.editingMessageID != m.messageID}">
                                    <h:commandButton
                                        rendered="#{m.senderID == userLoginBean.userId and empty m.deletedAt and not messageService.isSeenByOtherUser(m.messageID)}"
                                        value="✏️ Edit" action="#{messageService.startEdit(m.messageID, m.messageText)}"
                                        styleClass="btn-secondary">
                                        <f:ajax execute="@this" render=":chatForm"/>
                                    </h:commandButton>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{messageService.editingMessageID == m.messageID}">
                                    <h:commandButton value="💾 Save" action="#{messageService.editMessage(m.messageID)}" styleClass="btn-success">
                                        <f:ajax execute="@form" render=":chatForm"/>
                                    </h:commandButton>
                                </h:panelGroup>
                                <h:commandButton
                                    rendered="#{empty m.deletedAt and (m.senderID == userLoginBean.userId or userLoginBean.userId == dashboardBean.selectedServerOwnerID)}"
                                    value="🗑️ Delete"
                                    action="#{messageService.deleteMessage(m.messageID, m.senderID, dashboardBean.selectedServerID)}"
                                    styleClass="btn-danger">
                                    <f:ajax execute="@this" render=":chatForm"/>
                                </h:commandButton>
                            </div>
                        </div>
                    </ui:repeat>
                </div>

                <h:outputText id="messagesTable" />
            </h:form>

            <!-- Send bar -->
            <h:form id="sendForm" enctype="multipart/form-data">
                <div class="send-bar">
                    <h:inputText value="#{messageService.messageText}" placeholder="Message the channel..." style="flex:1;" />
                    <h:inputFile value="#{messageService.uploadedFile}" style="font-size:0.82rem; color:var(--text-muted);" />
                    <h:commandButton value="Send →" action="#{messageService.sendMessage}" styleClass="btn-primary" style="margin:0;" />
                </div>
            </h:form>

        </div>
    </h:panelGroup>

    <h:panelGroup rendered="#{userLoginBean.userId == 0}">
        <div class="container container-sm">
            <div class="alert alert-info">🔒 <strong>Not logged in</strong> — Please sign in to chat.</div>
            <h:button value="Go to Login" outcome="login.xhtml" styleClass="btn-primary" />
        </div>
    </h:panelGroup>
</h:body>
</html>
