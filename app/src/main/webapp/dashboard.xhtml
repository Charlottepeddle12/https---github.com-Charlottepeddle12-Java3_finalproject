<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
      <f:metadata>
        <f:viewAction action="#{messageService.loadConversations}" />
    </f:metadata>
<h:head>
    <title>Dashboard</title>
</h:head>
<h:body style="margin:0; font-family:Arial,Helvetica,sans-serif; background:#f8fafc; color:#0f172a;"> 
    <h:panelGroup id="dashboard" rendered="#{userLoginBean.token != null}">
        <div style="background:#1e40af; color:white; padding:32px 24px;">  
            <div style="max-width:1080px; margin:0 auto; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:16px;">
                <div>
                    <h1 style="margin:0; font-size:34px;">
                        Hello, #{userLoginBean.userName}
                    </h1>
                    <p style="margin:8px 0 0; opacity:0.87;">
                        Your dashboard
                    </p>
                </div>
                <h:form>
                    <h:commandButton value="Logout"
                                     action="#{userLoginBean.logout}"
                                     style="padding:12px 22px; background:#ef4444; color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer;" />
                </h:form>
            </div>
        </div>
        <div style="max-width:1080px; margin:28px auto; padding:0 24px; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px;">
            <div style="background:white; border-radius:24px; padding:26px; box-shadow:0 18px 45px rgba(15,23,42,0.08);">
                <h2>Friends</h2>
                <h:form>
                    <h:commandButton value="Go to Friends" action="friends.xhtml?faces-redirect=true" style="margin-top:16px; padding:12px; width:100%; background:#2563eb; color:white; border:none; border-radius:14px; font-weight:700;" />
                </h:form>
            </div>
            <div style="background:white; border-radius:24px; padding:26px; box-shadow:0 18px 45px rgba(15,23,42,0.08);">
                <h2>Servers</h2>
                <h:form>
                    <h:commandButton value="Go to Servers" action="server.xhtml?faces-redirect=true" style="margin-top:16px; padding:12px; width:100%; background:#2563eb; color:white; border:none; border-radius:14px; font-weight:700;" />
                </h:form>
            </div>
            <div style="background:white; border-radius:24px; padding:26px; box-shadow:0 18px 45px rgba(15,23,42,0.08);">
                <h2>Blocked Users</h2>
                <h:form>
                    <h:commandButton value="Manage Blocks" action="block.xhtml?faces-redirect=true" style="margin-top:16px; padding:12px; width:100%; background:#2563eb; color:white; border:none; border-radius:14px; font-weight:700;"  />
                </h:form>
            </div>
        </div>
        <div style="max-width:1080px; margin:20px auto; padding:0 24px;">
            <div style="background:white; border-radius:24px; padding:26px; box-shadow:0 18px 45px rgba(15,23,42,0.08);">
                <h3>Start Direct Message</h3>
                <h:form>
                    <h:inputText value="#{messageService.targetUsername}" style="width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:12px; margin-bottom:12px;"/>
                    <h:commandButton value="Start DM" action="#{messageService.createConversation}" style="padding:12px 18px; background:#16a34a; color:white; border:none; border-radius:12px; font-weight:700;"/>
                    <br/><br/>
                    <h:outputText value="#{messageService.createConversationStatus}" style="color:green;" />
                </h:form>
            </div>
        </div>   
        <div style="max-width:1080px; margin:20px auto; padding:0 24px;">
            <div style="background:white; border-radius:24px; padding:26px; box-shadow:0 18px 45px rgba(15,23,42,0.08);">
                <h3>Your Conversations</h3>
                <h:form>
                    <ui:repeat value="#{messageService.conversations}" var="c">
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #e2e8f0;">
                            <h:outputText value="#{c.username}"/>
                            <h:commandButton value="Open DM"
                                action="dm.xhtml?faces-redirect=true"
                                style="padding:8px 14px; background:#2563eb; color:white; border:none; border-radius:10px; font-weight:600;">
                                <f:setPropertyActionListener 
                                    target="#{messageService.conversationID}" 
                                    value="#{c.conversationID}" />
                            </h:commandButton>
                        </div>
                    </ui:repeat>
                </h:form>
            </div>
        </div>
    </h:panelGroup>
    <h:outputText rendered="#{userLoginBean.userId == 0}"  value="Please login first." />
</h:body>
</html>
