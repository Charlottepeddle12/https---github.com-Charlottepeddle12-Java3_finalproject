<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>Dashboard</title>
</h:head>
<h:body>
    <h:panelGroup id="dashboard" rendered="#{userLoginBean.token != null}">
        <h2>Welcome, #{userLoginBean.userName}!</h2>
        <h3>Dashboard</h3>
        <h:form>
            <h:commandButton value="Friends" action="friends.xhtml?faces-redirect=true" />
            <h:commandButton value="Servers" action="server.xhtml?faces-redirect=true" />
            <h:commandButton value="Logout" action="#{userLoginBean.logout}" />
            <h:commandButton value="Blocked Users" action="block.xhtml?faces-redirect=true" />
        </h:form>
    </h:panelGroup>
    <h:outputText rendered="#{userLoginBean.userId == 0}" 
                    value="Please login first." />
</h:body>
</html>
