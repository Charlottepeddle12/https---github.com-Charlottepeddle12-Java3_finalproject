<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
      <f:metadata>
        <f:event type="preRenderView" listener="#{friendsBean.loadReceivedFriendRequests}" />
        <f:event type="preRenderView" listener="#{friendsBean.loadFriendNames}" />
        <f:event type="preRenderView" listener="#{blockUserBean.loadBlockedUsers}" />
        <f:event type="preRenderView" listener="#{friendsBean.loadSentFriendRequests}" />
        
    </f:metadata>

<h:head>
    <title>Friends Page</title>
</h:head>
<h:body>
    <h:panelGroup  rendered="#{userLoginBean.token != null}">
        <h1>Send Friend Request</h1>
            <h:form>
                <h:button value="Back to Dashboard" outcome="dashboard.xhtml" />
                <br/><br/>
                <h:outputLabel for="friendUsername">
                    <h:outputText value="Username: "/>
                </h:outputLabel>
                <h:inputText id="friendUsername" value="#{friendsBean.sendFriendUserName}" required="true"/>
                <h:commandButton value="Send Request" action="#{friendsBean.sendFriendRequest}" />
                <h:messages />
                <h:outputText value="#{friendsBean.sendMessage}" />
            </h:form>

            <!-- Sent Friend Requests Section -->
            <h2>Sent Friend Requests</h2>
            <h:panelGroup rendered="#{empty friendsBean.sentFriendRequests}">
                <p>No pending sent friend requests.</p>
            </h:panelGroup>
            <h:panelGroup rendered="#{not empty friendsBean.sentFriendRequests}">
                <ui:repeat value="#{friendsBean.sentFriendRequests}" var="sentRequest">
                    <h:form>
                        <h:outputText value="#{sentRequest}" />
                        <h:commandButton value="Cancel Request" action="#{friendsBean.cancelSentFriendRequest(sentRequest)}" />
                    </h:form>
                </ui:repeat>
            </h:panelGroup>
            <h1>Accept Friend Request</h1>
            <h:form>
                <h:outputLabel for="acceptFriendUsername">
                    <h:outputText value="Username: "/>
                </h:outputLabel>
                <h:inputText id="acceptFriendUsername" value="#{friendsBean.acceptFriendUserName}" required="true"/>
                <h:commandButton value="Accept Request" action="#{friendsBean.acceptFriendRequest}" />
                <h:messages />
                <h:outputText value="#{friendsBean.acceptMessage}" />
            </h:form>
            <h:panelGroup rendered="#{empty friendsBean.receivedFriendRequests}">
                <p>No pending friend requests.</p>
                <h:outputText value="#{friendsBean.receivedRequestsMessage}" />
            </h:panelGroup>
            <h:panelGroup rendered="#{not empty friendsBean.receivedFriendRequests}">
                <ui:repeat value="#{friendsBean.receivedFriendRequests}" var="requesterName">
                    <p>#{requesterName}</p>
                </ui:repeat>
            </h:panelGroup>
            <h1>Friends</h1>
            <h2>Total Friends: #{friendsBean.friendCount}</h2>
            <h3>Your Friends</h3>
            <h:panelGroup rendered="#{empty friendsBean.friendNames}">
                <p>No accepted friends yet.</p>
            </h:panelGroup>
            <h:panelGroup rendered="#{not empty friendsBean.friendNames}">
                <ui:repeat value="#{friendsBean.friendNames}" var="friendName">
                    <p>#{friendName}</p>
                </ui:repeat>
            </h:panelGroup>>
    </h:panelGroup>
    <h:outputText rendered="#{userLoginBean.userId == 0}" 
                    value="Please login first." />
</h:body>

</html>
