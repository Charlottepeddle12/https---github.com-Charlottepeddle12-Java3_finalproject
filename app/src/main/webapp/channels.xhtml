<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<f:metadata>
    <f:event type="preRenderView" listener="#{friendsBean.loadReceivedFriendRequests}" />
    <f:event type="preRenderView" listener="#{friendsBean.loadFriendNames}" />
    <f:event type="preRenderView" listener="#{blockUserBean.loadBlockedUsers}" />
    <f:event type="preRenderView" listener="#{friendsBean.loadSentFriendRequests}" />
    <f:event type="preRenderView" listener="#{channelBean.loadChannels}" />
    <f:viewParam name="serverName" value="#{channelBean.serverName}" />
</f:metadata>
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Channels — #{channelBean.serverName}</title>
    <h:outputStylesheet name="style.css" />
</h:head>
<h:body>
    <h:panelGroup rendered="#{userLoginBean.token != null}">
        <div class="container">

            <div class="navbar">
                <h:button value="← Dashboard" outcome="dashboard.xhtml" styleClass="btn-back" />
                <h:button value="← Servers"   outcome="server.xhtml?faces-redirect=true" styleClass="btn-back" />
            </div>

            <h1>📡 #{channelBean.serverName}</h1>

            <!-- Create channel -->
            <h:form>
                <h:messages styleClass="alert alert-error" />
                <div class="card">
                    <h3>➕ Create New Channel</h3>
                    <div class="form-inline">
                        <h:inputText id="channelName" value="#{channelBean.channelName}"
                                     placeholder="channel-name" required="true" />
                        <h:commandButton value="Create" action="#{channelBean.createChannel}" styleClass="btn-success">
                            <f:ajax execute="@form" render="@form channelTable"/>
                        </h:commandButton>
                    </div>
                    <h:outputText rendered="#{not empty channelBean.createMessage}"
                                 value="#{channelBean.createMessage}" styleClass="alert alert-success" />
                </div>
            </h:form>

            <h2>Channels</h2>

            <h:form>
                <h:panelGroup rendered="#{empty channelBean.channels}">
                    <div class="empty-state">
                        <span class="empty-icon">📡</span>
                        <p>No channels yet — create one above!</p>
                    </div>
                </h:panelGroup>

                <h:panelGroup rendered="#{not empty channelBean.channels}">
                    <table id="channelTable">
                        <thead>
                            <tr>
                                <th>#  Channel</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{channelBean.channels}" var="c">
                                <tr>
                                    <td><strong># #{c.name}</strong></td>
                                    <td>
                                        <h:form style="display:inline; margin:0;">
                                            <h:button value="💬 Open Chat" outcome="chat.xhtml" styleClass="btn-primary">
                                                <f:param name="channelID"  value="#{c.channelID}" />
                                                <f:param name="serverName" value="#{channelBean.serverName}" />
                                            </h:button>
                                            <h:commandButton value="🗑️ Delete" action="#{channelBean.deleteChannel(c.channelID)}"
                                                             styleClass="btn-danger"
                                                             onclick="return confirm('Delete this channel?');"
                                                             immediate="true">
                                                <f:ajax execute="@this" render=":container" />
                                            </h:commandButton>
                                        </h:form>
                                    </td>
                                </tr>
                            </ui:repeat>
                        </tbody>
                    </table>
                    <h:outputText rendered="#{not empty channelBean.deleteChannelMessage}"
                                 value="#{channelBean.deleteChannelMessage}" styleClass="alert alert-error" />
                </h:panelGroup>
            </h:form>

        </div>
    </h:panelGroup>

    <h:panelGroup rendered="#{userLoginBean.userId == 0}">
        <div class="container container-sm">
            <div class="alert alert-info">🔒 <strong>Not logged in</strong> — Please sign in to manage channels.</div>
            <h:button value="Go to Login" outcome="login.xhtml" styleClass="btn-primary" />
        </div>
    </h:panelGroup>
</h:body>
</html>
