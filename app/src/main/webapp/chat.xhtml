<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <f:metadata>
        <f:event type="preRenderView" listener="#{friendsBean.loadReceivedFriendRequests}" />
        <f:event type="preRenderView" listener="#{friendsBean.loadFriendNames}" />
    </f:metadata>
    <h:head>
        <title>Jakarta Facelets and JNDI DataSources</title>
    </h:head>
    <h:body>
        <h:panelGroup id="login" rendered="#{userLoginBean.token == null}">
            <h1>Login / Signup</h1>
            <h:form>
                <h:outputLabel for="username">
                    <h:outputText value="Username: "/>
                </h:outputLabel>
                <h:inputText value="#{userLoginBean.userName}" required="true"/>
                <h:outputLabel for="password">
                    <h:outputText value="Password: "/>
                </h:outputLabel>
                <h:inputSecret value="#{userLoginBean.userPassword}" required="true" redisplay="false"/>
                <h:commandButton value="Login" action="#{userLoginBean.updateToken}" />
                <h:commandButton value="Sign-Up" action="#{userLoginBean.signup}" />
                <h:messages />
                <h:outputText value="#{userLoginBean.message}" />
            </h:form>
        </h:panelGroup>
        <h:panelGroup id="server" rendered="#{userLoginBean.token != null}">
            <h1>Refresh Chat!</h1>
            <h:form>
                <h:commandButton value="Refresh" action="#{chatLogBean.pullLog}" />
                <h:messages />
            </h:form>
            <h1>Send Friend Request</h1>
            <h:form>
                <h:outputLabel for="friendUsername">
                    <h:outputText value="Username: "/>
                </h:outputLabel>
                <h:inputText id="friendUsername" value="#{friendsBean.sendFriendUserName}" required="true"/>
                <h:commandButton value="Send Request" action="#{friendsBean.sendFriendRequest}" />
                <h:messages />
                <h:outputText value="#{friendsBean.sendMessage}" />
            </h:form>
            <h1>Accept Friend Request</h1>
            <h:form>
                <h:outputLabel for="acceptFriendUsername">
                    <h:outputText value="Username: "/>
                </h:outputLabel>
                <h:inputText id="acceptFriendUsername" value="#{friendsBean.acceptFriendUserName}" required="true"/>
                <h:commandButton value="Accept Request" action="#{friendsBean.acceptFriendRequest}" />
                <h:messages />
                <h:outputText value="#{friendsBean.acceptMessage}" />
            </h:form>
            <h:panelGroup rendered="#{empty friendsBean.receivedFriendRequests}">
                <p>No pending friend requests.</p>
                <h:outputText value="#{friendsBean.receivedRequestsMessage}" />
            </h:panelGroup>
            <h:panelGroup rendered="#{not empty friendsBean.receivedFriendRequests}">
                <ui:repeat value="#{friendsBean.receivedFriendRequests}" var="requesterName">
                    <p>#{requesterName}</p>
                </ui:repeat>
            </h:panelGroup>
            <h1>Friends</h1>
            <h2>Total Friends: #{friendsBean.friendCount}</h2>
            <h3>Your Friends</h3>
            <h:panelGroup rendered="#{empty friendsBean.friendNames}">
                <p>No accepted friends yet.</p>
            </h:panelGroup>
            <h:panelGroup rendered="#{not empty friendsBean.friendNames}">
                <ui:repeat value="#{friendsBean.friendNames}" var="friendName">
                    <p>#{friendName}</p>
                </ui:repeat>
            </h:panelGroup>
            <h1>Post a Message!</h1>
            <h:form>
                <h:inputText value="#{chatLogBean.messageToPost}" required="true"/>
                <h:commandButton value="Post" action="#{chatLogBean.postMessage}" />
                <h:messages />
            </h:form>
            <h:panelGroup id="chat">
                <ui:repeat value="#{chatLogBean.chatLog}" var="p">
                    <p>#{p}</p>
                </ui:repeat>
            </h:panelGroup>
        </h:panelGroup>
    </h:body>
</html>
