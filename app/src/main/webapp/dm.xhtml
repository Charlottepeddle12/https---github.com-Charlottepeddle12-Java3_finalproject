<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Direct Messages | Community Hub</title>
</h:head>

<h:body style="margin:0; font-family:Arial,Helvetica,sans-serif; background:#f8fafc; color:#0f172a;">
    <div style="max-width:760px; margin:32px auto; padding:24px; background:white; border-radius:24px; box-shadow:0 24px 60px rgba(15,23,42,0.08);">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
            <div>
                <h1 style="margin:0; font-size:28px;">Direct Messages</h1>
                <p style="margin:8px 0 0; color:#475569;">Send a private message to another user by username.</p>
            </div>
            <h:link outcome="dashboard" value="Back to Dashboard"
                    style="padding:12px 18px; background:#2563eb; color:white; border-radius:14px; text-decoration:none; font-weight:700;" />
        </div>

        <h:form>
            <h:outputText value="#{dmBean.message}" style="display:block; color:#b91c1c; margin:18px 0;" />
            <div style="margin-bottom:18px;">
                <h:outputLabel for="recipient" value="Recipient username" style="display:block; margin-bottom:8px; font-weight:600; color:#0f172a;" />
                <h:inputText id="recipient" value="#{dmBean.receiverUserName}" style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:14px;" required="true" />
            </div>
            <div style="margin-bottom:24px;">
                <h:outputLabel for="dmText" value="Message" style="display:block; margin-bottom:8px; font-weight:600; color:#0f172a;" />
                <h:inputText id="dmText" value="#{dmBean.messageText}" style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:14px;" required="true" />
            </div>
            <h:commandButton value="Send DM" action="#{dmBean.sendDM}"
                             style="padding:14px 20px; background:#2563eb; color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer;" />
        </h:form>
    </div>
</h:body>
</html>
