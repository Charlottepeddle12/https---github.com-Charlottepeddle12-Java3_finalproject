<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<f:metadata>
    <f:viewAction action="#{blockUserBean.loadBlockedUsers}" />
</f:metadata>

<h:head>
    <title>Block Users | Community Hub</title>
</h:head>

<h:body style="margin:0; font-family:Arial,Helvetica,sans-serif; background:#f8fafc; color:#0f172a;">

    <div style="max-width:760px; margin:32px auto; padding:24px; background:white; border-radius:24px; box-shadow:0 24px 60px rgba(15,23,42,0.08);">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
            <div>
                <h1 style="margin:0; font-size:28px;">Block / Unblock Users</h1>
                <p style="margin:8px 0 0; color:#475569;">Add or remove blocked users from your account.</p>
            </div>

            <h:link outcome="dashboard.xhtml"
                    value="Back to Dashboard"
                    style="padding:12px 18px; background:#2563eb; color:white; border-radius:14px; text-decoration:none; font-weight:700;" />
        </div>

        <h:outputText value="#{blockUserBean.message}"
                      style="display:block; margin:18px 0; color:#b91c1c;" />

        <div style="display:grid; gap:20px;">

            <div style="padding:24px; background:#f1f5f9; border-radius:20px;">
                <h2 style="margin-top:0;">Block a User</h2>

                <h:form>
                    <div style="margin-bottom:18px;">
                        <h:outputLabel for="blockedUser"
                                       value="Username"
                                       style="display:block; margin-bottom:8px; font-weight:600; color:#0f172a;" />

                        <h:inputText id="blockedUser"
                                     value="#{blockUserBean.blockedUserName}"
                                     required="true"
                                     style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:14px;" />
                    </div>

                    <h:commandButton value="Block User"
                                     action="#{blockUserBean.blockUser}"
                                     style="padding:12px 18px; background:#ef4444; color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer;" />
                </h:form>
            </div>

            <div style="padding:24px; background:#f1f5f9; border-radius:20px;">
                <h2 style="margin-top:0;">Unblock a User</h2>

                <h:form>
                    <div style="margin-bottom:18px;">
                        <h:outputLabel for="unblockUser"
                                       value="Username"
                                       style="display:block; margin-bottom:8px; font-weight:600; color:#0f172a;" />

                        <h:inputText id="unblockUser"
                                     value="#{blockUserBean.blockedUserName}"
                                     required="true"
                                     style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:14px;" />
                    </div>

                    <h:commandButton value="Unblock User"
                                     action="#{blockUserBean.unblockUser}"
                                     style="padding:12px 18px; background:#16a34a; color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer;" />
                </h:form>
            </div>

        </div>

        <div style="margin-top:28px; padding:24px; background:#e2e8f0; border-radius:20px;">
            <h2 style="margin-top:0;">Blocked Users</h2>

            <ui:repeat value="#{blockUserBean.blockedUserNames}" var="blocked">
                <div style="padding:12px 0; border-bottom:1px solid #cbd5e1; color:#0f172a;">
                    #{blocked}
                </div>
            </ui:repeat>

            <h:panelGroup rendered="#{empty blockUserBean.blockedUserNames}">
                <div style="padding:12px 0; color:#64748b;">
                    No blocked users yet.
                </div>
            </h:panelGroup>
        </div>

    </div>

</h:body>
</html>
