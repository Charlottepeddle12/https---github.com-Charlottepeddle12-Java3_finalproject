<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <h:head>
        <title>Add/remove user</title>
    </h:head>
    <h:body>
        <h1>Add to server</h1>
        <h:outputText value="#{serverBean.message}"/>
        <h:form>
            <h1>Server ID</h1>
            <h:inputText value="#{serverBean.serverID}" required="true"/>
            <h1>User ID</h1>
            <h:inputText value="#{serverBean.userID}" required="true"/>
            <h:commandButton value="Add" action="#{serverBean.joinServer}"/>
        </h:form>
        <h:form>
            <h1>Remove from server</h1>
            <h1>Server ID</h1>
            <h:inputText value="#{serverBean.serverID}" required="true"/>
            <h1>User ID</h1>
            <h:inputText value="#{serverBean.userID}" required="true"/>
            <h:commandButton value="Remove" action="#{serverBean.leaveServer}"/>
        </h:form>
    </h:body>
</html>
