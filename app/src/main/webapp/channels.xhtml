<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<f:metadata>
    <f:viewAction action="#{channelBean.loadChannels}" />
</f:metadata>

<h:head>
    <title>Channels | Community Hub</title>
</h:head>

<h:body style="margin:0; font-family:Arial,Helvetica,sans-serif; background:#f8fafc; color:#0f172a;">

    <div style="max-width:960px; margin:32px auto; padding:24px; background:white; border-radius:24px; box-shadow:0 24px 60px rgba(15,23,42,0.08);">

        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
            <div>
                <h1 style="margin:0; font-size:28px;">Channels</h1>
                <p style="margin:8px 0 0; color:#475569;">View or create channels by server ID.</p>
            </div>

            <h:link outcome="dashboard" value="Back to Dashboard"
                    style="padding:12px 18px; background:#2563eb; color:white; border-radius:14px; text-decoration:none; font-weight:700;" />
        </div>

        <h:outputText value="#{channelBean.message}"
                      rendered="#{not empty channelBean.message}"
                      style="display:block; margin:18px 0; color:#b91c1c;" />

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:24px;">

            <div style="padding:24px; background:#f1f5f9; border-radius:20px;">
                <h2 style="margin-top:0;">Load Channels</h2>

                <h:form>
                    <div style="margin-bottom:18px;">
                        <h:outputLabel for="serverId" value="Server ID"
                                       style="display:block; margin-bottom:8px; font-weight:600;" />

                        <h:inputText id="serverId" value="#{channelBean.serverID}"
                                     required="true"
                                     style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:14px;" />
                    </div>

                    <h:commandButton value="Load Channels"
                                     action="#{channelBean.loadChannels}"
                                     style="padding:12px 18px; background:#2563eb; color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer;" />
                </h:form>
            </div>

            <div style="padding:24px; background:#f1f5f9; border-radius:20px;">
                <h2 style="margin-top:0;">Create Channel</h2>

                <h:form>
                    <div style="margin-bottom:18px;">
                        <h:outputLabel for="channelName" value="Channel name"
                                       style="display:block; margin-bottom:8px; font-weight:600;" />

                        <h:inputText id="channelName" value="#{channelBean.channelName}"
                                     required="true"
                                     style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:14px;" />
                    </div>

                    <div style="margin-bottom:18px;">
                        <h:outputLabel for="serverIdCreate" value="Server ID"
                                       style="display:block; margin-bottom:8px; font-weight:600;" />

                        <h:inputText id="serverIdCreate" value="#{channelBean.serverID}"
                                     required="true"
                                     style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:14px;" />
                    </div>

                    <h:commandButton value="Create Channel"
                                     action="#{channelBean.createChannel}"
                                     style="padding:12px 18px; background:#16a34a; color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer;" />
                </h:form>
            </div>

        </div>

        <div style="margin-top:32px;">
            <h2 style="margin-bottom:16px;">Channel List</h2>

            <h:form>
                <ui:repeat value="#{channelBean.channels}" var="channel">
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; background:#f8fafc; border-radius:18px; margin-bottom:12px; border:1px solid #e2e8f0;">
                        <div>
                            <strong>#{channel.name}</strong>
                            <div style="color:#64748b; font-size:0.95rem;">ID: #{channel.channelID}</div>
                        </div>

                        <h:commandButton value="Delete"
                                         action="#{channelBean.deleteChannel(channel.channelID)}"
                                         style="padding:10px 16px; background:#ef4444; color:white; border:none; border-radius:12px; cursor:pointer;" />
                    </div>
                </ui:repeat>
            </h:form>

            <h:panelGroup rendered="#{empty channelBean.channels}">
                <div style="padding:20px; border-radius:18px; background:#e2e8f0; color:#334155;">
                    No channels loaded yet.
                </div>
            </h:panelGroup>
        </div>

    </div>

</h:body>
</html>
