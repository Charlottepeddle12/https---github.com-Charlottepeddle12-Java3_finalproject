<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head><title>Messages | Community Hub</title></h:head>

<h:body style="font-family:Arial,Helvetica,sans-serif; background:#f8fafc; color:#0f172a; padding:20px;">
    <f:metadata>
<f:viewAction action="#{messageBean.loadMessages}" />
    </f:metadata>

    
<div style="max-width:1080px; margin:0 auto; padding:24px; background:white; border-radius:24px; box-shadow:0 24px 60px rgba(15,23,42,0.08);">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;">
            <div>
                <h1 style="margin:0; font-size:28px;">Message History</h1>
                <p style="margin:8px 0 0; color:#475569;">Browse your recent channel messages.</p>
            </div>
            <h:link outcome="chat.xhtml" value="Open Chat" style="padding:12px 18px; background:#2563eb; color:white; border-radius:14px; text-decoration:none; font-weight:700;" />
        </div>

        <h:outputText value="#{messageBean.message}" style="display:block; margin:18px 0; color:#d97706;" />
        <div style="display:grid; gap:14px;">
            <ui:repeat value="#{messageBean.messages}" var="msg">
                <div style="padding:18px; border-radius:18px; background:#f1f5f9; border:1px solid #e2e8f0;">
                    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; font-size:0.95rem; color:#0f172a;">
                        <span><strong>#{msg.username}</strong></span>
                        <span style="color:#64748b;">#{msg.sentOn}</span>
                    </div>
                    <p style="margin:10px 0 0; color:#334155;">#{msg.messageText}</p>
                </div>
            </ui:repeat>
            <h:panelGroup rendered="#{empty messageBean.messages}">
                <div style="padding:20px; border-radius:18px; background:#e2e8f0; color:#334155; text-align:center;">
                    No messages found. Visit chat to start a conversation.
                </div>
            </h:panelGroup>
        </div>
    </div>
</h:body>
</html>
