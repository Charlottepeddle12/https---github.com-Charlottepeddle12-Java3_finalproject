<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Sign Up</title>
    <h:outputStylesheet name="style.css" />
</h:head>
<h:body>
    <h:panelGroup id="login" rendered="#{userLoginBean.token == null}">
        <div class="container-sm">
            <div class="login-logo">
                <div class="logo-icon">💬</div>
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to your account or create a new one</p>

            <h:form>
                <h:messages styleClass="alert alert-error" />
                <h:outputText rendered="#{not empty userLoginBean.message}"
                             value="#{userLoginBean.message}"
                             styleClass="alert alert-error" />

                <div class="form-group">
                    <h:outputLabel for="username" value="Username" />
                    <h:inputText id="username" value="#{userLoginBean.userName}"
                                 required="true" placeholder="Enter your username" />
                </div>

                <div class="form-group">
                    <h:outputLabel for="password" value="Password" />
                    <h:inputSecret id="password" value="#{userLoginBean.userPassword}"
                                   required="true" redisplay="false" placeholder="Enter your password" />
                </div>

                <div style="display:flex; gap:10px; margin-top:6px;">
                    <h:commandButton value="🔑  Login"  action="#{userLoginBean.login}"  styleClass="btn-primary"  style="flex:1;" />
                    <h:commandButton value="✨  Sign Up" action="#{userLoginBean.signup}" styleClass="btn-secondary" style="flex:1;" />
                </div>
            </h:form>
        </div>
    </h:panelGroup>

    <h:panelGroup id="dashboard" rendered="#{userLoginBean.token != null}">
        <div class="container-sm">
            <div class="welcome-section" style="justify-content:center;">
                <div>
                    <h2>Welcome back, #{userLoginBean.userName}! 👋</h2>
                    <p class="welcome-sub">You are already signed in.</p>
                </div>
                <div class="welcome-avatar">😄</div>
            </div>
            <h:form>
                <h:commandButton value="🏠  Go to Dashboard"
                                 action="dashboard.xhtml?faces-redirect=true"
                                 styleClass="btn-primary"
                                 style="width:100%; padding:13px;" />
            </h:form>
        </div>
    </h:panelGroup>
</h:body>
</html>
